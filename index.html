<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DocWorks — BOM to Manufacturing Documents</title>
<style>
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif}
  #boot{padding:60px 20px;text-align:center;color:#1F3864}
  #boot .bar{width:220px;height:4px;background:#eee;margin:18px auto;overflow:hidden;border-radius:2px}
  #boot .bar div{width:40%;height:100%;background:#2E5395;animation:s 1.1s infinite}
  @keyframes s{0%{margin-left:-40%}100%{margin-left:100%}}
  #diag{display:none;max-width:640px;margin:30px auto;padding:14px 16px;border:1px solid #B03A00;background:#FBE4D5;color:#7A2800;font-size:13px;border-radius:4px;text-align:left;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<div id="root"><div id="boot"><div style="font-weight:800;letter-spacing:.12em;font-size:20px">DOC<span style="color:#F2C14E">WORKS</span></div><div class="bar"><div></div></div><div style="font-size:12px;color:#888">loading…</div></div></div>
<div id="diag"></div>
<script>
(function(){
  var errs=[];
  function show(){var d=document.getElementById("diag");d.style.display="block";
    d.textContent="DocWorks failed to start. Diagnostics:\n\n"
      +"React loaded: "+(!!window.React)+"\nReactDOM loaded: "+(!!window.ReactDOM)+"\nSheetJS loaded: "+(!!window.XLSX)+"\napp.js executed: "+(!!window.__docworksLoaded)
      +(errs.length?"\n\nErrors:\n"+errs.join("\n"):"\n\nNo script errors captured — check that app.js is present next to index.html in the repository.");}
  window.addEventListener("error",function(e){
    if(e.target&&e.target.src){errs.push("Failed to load: "+e.target.src);show();return;}
    errs.push((e.message||"error")+(e.filename?"  ["+e.filename.split("/").pop()+":"+e.lineno+"]":""));
  },true);
  window.addEventListener("unhandledrejection",function(e){errs.push("Promise rejection: "+(e.reason&&e.reason.message||e.reason));});
  setTimeout(function(){var b=document.getElementById("boot");if(b&&document.body.contains(b))show();},12000);
  window.__docworksShowDiag=show;
})();
</script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js?v=0.9.2"></script>
<script>if(!window.__docworksLoaded)window.__docworksShowDiag&&setTimeout(window.__docworksShowDiag,500);</script>
</body>
</html>
