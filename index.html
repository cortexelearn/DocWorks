<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DocWorks — BOM to Manufacturing Documents</title>
<style>
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif}
  #boot{padding:60px;text-align:center;color:#1F3864}
  #boot .bar{width:220px;height:4px;background:#eee;margin:18px auto;overflow:hidden;border-radius:2px}
  #boot .bar div{width:40%;height:100%;background:#2E5395;animation:s 1.1s infinite}
  @keyframes s{0%{margin-left:-40%}100%{margin-left:100%}}
  #err{display:none;max-width:560px;margin:40px auto;padding:16px;border:1px solid #B03A00;background:#FBE4D5;color:#B03A00;font-size:14px;border-radius:4px}
</style>
</head>
<body>
<div id="root"><div id="boot"><div style="font-weight:800;letter-spacing:.12em;font-size:20px">DOC<span style="color:#F2C14E">WORKS</span></div><div class="bar"><div></div></div><div style="font-size:12px;color:#888">loading libraries…</div></div></div>
<div id="err">DocWorks could not load its libraries (React / Babel / SheetJS) from the CDN. Check your internet connection or corporate proxy allow-list for cdnjs.cloudflare.com, then reload. All document processing itself runs 100% locally in your browser.</div>
<script>window.addEventListener("error",function(e){if(/cdnjs/.test((e.target&&e.target.src)||""))document.getElementById("err").style.display="block";},true);</script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
